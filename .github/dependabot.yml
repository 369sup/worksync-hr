version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 10
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      firebase:
        patterns:
          - firebase
      ui-foundation:
        patterns:
          - tailwindcss
          - '@tailwindcss/*'
          - shadcn
          - '@radix-ui/*'
          - radix-ui
          - class-variance-authority
          - clsx
          - tailwind-merge
          - tw-animate-css
